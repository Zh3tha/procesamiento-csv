name: Build and Push Docker Image and Update K8s Manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: zh3tha/aquacounter:${{ github.sha }}

      - name: Update Kubernetes manifest
        run: |
          sed -i 's|zh3tha/aquacounter:.*|zh3tha/aquacounter:${{ github.sha }}|g' ./k8s/deployment.yml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update deployment manifest with new image tag"
          git push
